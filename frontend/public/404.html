<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>FlowDay</title>
    <script>
      // Redireciona rotas desconhecidas de volta ao index.html preservando o path
      // segmentCount = 1 para repos de projeto (nicoryy.github.io/FlowDay)
      var segmentCount = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + segmentCount)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(segmentCount)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
